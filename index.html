<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>เกม Moss วิ่งสู้ฟัด</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
        }
        h1 {
            margin: 0 0 20px 0;
            color: #693e2f;
            font-size: 20px; 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            text-align: center;
        }
        canvas {
            background-color: #e0f7fa;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            border-bottom: 15px solid #693e2f; 
            max-width: 100%; 
            height: auto;
        }
    </style>
</head>
<body>

    <h1>MOSS RUNNER</h1>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- โหลดรูปภาพ Moss ---
    const mossImage = new Image();
    mossImage.src = "moss.png"; 

    const PLAYER_WIDTH = 100;  
    const PLAYER_HEIGHT = 120; 
    const GROUND_THICKNESS = 15; 
    const GROUND_Y = canvas.height - GROUND_THICKNESS - PLAYER_HEIGHT; 

    // ตัวแปรผู้เล่น
    let player = {
        x: 80,
        y: GROUND_Y,
        width: PLAYER_WIDTH,
        height: PLAYER_HEIGHT,
        yVelocity: 0,
        gravity: 0.7, 
        jumpStrength: -16, 
        isGrounded: false,
        
        // --- 🎯 ตั้งค่า Hitbox สำหรับหลบพื้นที่ว่างในรูปภาพ ---
        hitboxOffset: {
            left: 25,   
            right: 25,  
            top: 15,    
            bottom: 0   
        }
    };

    // ตัวแปรสิ่งกีดขวาง
    let obstacles = [];
    let obstacleSpeed = 7;
    let spawnTimer = 0;

    // ระบบคะแนน สถานะเกม
    let score = 0;
    let isGameOver = false;

    // --- 🎮 ระบบควบคุม ---
    function handleJumpOrRestart() {
        if (isGameOver) {
            resetGame();
        } else if (player.isGrounded) {
            player.yVelocity = player.jumpStrength;
            player.isGrounded = false;
        }
    }

    window.addEventListener("keydown", function(e) {
        if (e.code === "Space") {
            e.preventDefault(); 
            handleJumpOrRestart();
        }
    });

    window.addEventListener("touchstart", function(e) {
        if (e.target === canvas) {
            e.preventDefault(); 
            handleJumpOrRestart();
        }
    }, { passive: false });

    function spawnObstacle() {
        let size = Math.floor(Math.random() * 30) + 20;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - GROUND_THICKNESS - size, 
            width: size,
            height: size,
            passed: false
        });
    }

    function resetGame() {
        player.y = GROUND_Y;
        player.yVelocity = 0;
        obstacles = [];
        obstacleSpeed = 7;
        score = 0;
        isGameOver = false;
        animate();
    }

    function drawGround() {
        ctx.fillStyle = "#8d6e63";
        ctx.fillRect(0, canvas.height - GROUND_THICKNESS, canvas.width, GROUND_THICKNESS);
    }

    function animate() {
        if (isGameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGround();

        // --- 1. จัดการผู้เล่น (Player Moss) ---
        player.yVelocity += player.gravity;
        player.y += player.yVelocity;

        if (player.y >= GROUND_Y) {
            player.y = GROUND_Y;
            player.yVelocity = 0;
            player.isGrounded = true;
        }

        // วาดภาพ Moss
        if (mossImage.complete) {
            ctx.drawImage(mossImage, player.x, player.y, player.width, player.height);
        } else {
            ctx.fillStyle = "#ff5722";
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // คำนวณตำแหน่ง Hitbox (ทำงานอยู่เบื้องหลังแบบไม่แสดงเส้นสีแดงแล้ว)
        let playerHitbox = {
            x: player.x + player.hitboxOffset.left,
            y: player.y + player.hitboxOffset.top,
            width: player.width - (player.hitboxOffset.left + player.hitboxOffset.right),
            height: player.height - (player.hitboxOffset.top + player.hitboxOffset.bottom)
        };

        // --- 2. จัดการสิ่งกีดขวาง (Obstacles) ---
        spawnTimer++;
        if (spawnTimer > Math.random() * 50 + 60) {
            spawnObstacle();
            spawnTimer = 0;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= obstacleSpeed;

            // วาดสิ่งกีดขวาง
            ctx.fillStyle = "#333333";
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

            // ตรวจสอบการชน
            if (
                playerHitbox.x < obs.x + obs.width &&
                playerHitbox.x + playerHitbox.width > obs.x &&
                playerHitbox.y < obs.y + obs.height &&
                playerHitbox.y + playerHitbox.height > obs.y
            ) {
                isGameOver = true;
            }

            // หลบพ้นแล้ว ได้คะแนน
            if (obs.x + obs.width < playerHitbox.x && !obs.passed) {
                score++;
                obs.passed = true;
                if (score % 5 === 0) {
                    obstacleSpeed += 1;
                }
            }

            if (obs.x + obs.width < 0) {
                obstacles.splice(i, 1);
            }
        }

        // --- 3. วาดคะแนน ---
        ctx.fillStyle = "#000000";
        ctx.font = "16px 'Press Start 2P'"; 
        ctx.fillText("SCORE: " + score, 25, 45);

        // --- 4. ตรวจสอบ Game Over ---
        if (isGameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff3333"; 
            ctx.font = "32px 'Press Start 2P'";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "11px 'Press Start 2P'"; 
            ctx.fillText("PRESS SPACE OR TOUCH TO RESTART", canvas.width / 2, canvas.height / 2 + 30);
            ctx.textAlign = "start"; 
            return;
        }

        requestAnimationFrame(animate);
    }

    // เริ่มเกม
    mossImage.onload = function() {
        animate();
    };
    setTimeout(function() {
        if (!isGameOver) animate();
    }, 1000); 

</script>

</body>
</html>
